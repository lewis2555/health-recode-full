name: Build Android APK with Buildozer
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y           git           file           build-essential           libssl-dev           libffi-dev           libgdk-pixbuf2.0-dev           libmpc-dev           libmpfr-dev           libgmp-dev           autoconf           libtool           pkg-config           zlib1g-dev           libncurses5-dev           libncursesw5-dev           libtinfo*           cmake           libexpat1-dev           libsqlite3-dev           wget           unzip           xz-utils           zip           libgl1-mesa-dev           libglu1-mesa-dev || true
      
    - name: Install Buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 packaging requests
        
    - name: Accept Android SDK licenses and install build-tools
      run: |
        mkdir -p ~/.android
        echo "sdk.dir=$HOME/.android/sdk" > local.properties
        mkdir -p $HOME/.android/sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $HOME/.android/sdk
        mkdir -p $HOME/.android/sdk/cmdline-tools/latest
        mv $HOME/.android/sdk/cmdline-tools/* $HOME/.android/sdk/cmdline-tools/latest/ 2>/dev/null || true
        yes | $HOME/.android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/.android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-33" "platform-tools"
        
    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug
      env:
        ANDROID_HOME: $HOME/.android/sdk
        ANDROID_SDK_ROOT: $HOME/.android/sdk
        
    - name: Find APK file
      id: find_apk
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        APK_PATH=$(find bin -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "No APK found in bin directory, searching everywhere..."
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: health-record-app-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
        if-no-files-found: error

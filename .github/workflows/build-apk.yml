name: Build Android APK with Buildozer
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y           git           file           build-essential           libssl-dev           libffi-dev           libgdk-pixbuf2.0-dev           libmpc-dev           libmpfr-dev           libgmp-dev           autoconf           libtool           pkg-config           zlib1g-dev           libncurses5-dev           libncursesw5-dev           libtinfo5           cmake           libexpat1-dev           libsqlite3-dev           wget           unzip           xz-utils           zip           libgl1-mesa-dev           libglu1-mesa-dev
      
    - name: Install Buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 packaging requests
        
    - name: Initialize Buildozer
      run: |
        buildozer init || true
        
    - name: Update buildozer.spec if needed
      run: |
        # Check if buildozer.spec exists, if not create it
        if [ ! -f buildozer.spec ]; then
          cat > buildozer.spec << 'EOF'
[app]
title = Health Record
package.name = healthrecord
package.domain = org.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 1.0
requirements = python3,kivy
orientation = portrait
fullscreen = 0
android.api = 33
android.minapi = 21
android.ndk = 25b
android.sdk = 33
android.arch = arm64-v8a
p4a.source_dir =
p4a.bootstrap = sdl2
p4a.extra_args = --add-source=org.kivy.android
EOF
        fi
        
    - name: Build APK with Buildozer
      run: |
        # Use verbose mode to see detailed output
        buildozer -v android debug
        
      env:
        ANDROID_HOME: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
        
    - name: Find APK file
      id: find_apk
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        APK_PATH=$(find bin -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "No APK found in bin directory, searching everywhere..."
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: health-record-app-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
        if-no-files-found: error
        
    - name: Create GitHub Release (optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.find_apk.outputs.APK_PATH }}
        tag_name: v${{ github.run_number }}
        name: Health Record App v${{ github.run_number }}
        body: |
          Auto-built APK from commit ${{ github.sha }}
          
          ## What's Changed
          - Automated build via GitHub Actions
          
          ## Installation
          Download the APK and install on your Android device.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Android APK with Buildozer
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y           git           file           build-essential           libssl-dev           libffi-dev           libgdk-pixbuf2.0-dev           libmpc-dev           libmpfr-dev           libgmp-dev           autoconf           libtool           pkg-config           zlib1g-dev           libncurses5-dev           libncursesw5-dev           cmake           libexpat1-dev           libsqlite3-dev           wget           unzip           xz-utils           zip           libgl1-mesa-dev           libglu1-mesa-dev || true
      
    - name: Install Buildozer and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 packaging requests
        
    - name: Pre-accept Android SDK licenses
      run: |
        # Create android sdk directory structure
        mkdir -p $HOME/.android
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        
        # Write license acceptance files directly
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.android/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.android/licenses/android-sdk-preview-license
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $HOME/.android/licenses/intel-android-extra-license
        
        # Also create for buildozer's sdk path
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug
      env:
        ANDROID_HOME: $HOME/.buildozer/android/platform/android-sdk
        ANDROID_SDK_ROOT: $HOME/.buildozer/android/platform/android-sdk
        
    - name: Find APK file
      id: find_apk
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        APK_PATH=$(find bin -name "*.apk" -type f | head -n 1)
        if [ -z "$APK_PATH" ]; then
          echo "No APK found in bin directory, searching everywhere..."
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: health-record-app-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
        if-no-files-found: error
